<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#121212"/>
  
  <!-- Pattern/Grain Background -->
  <pattern id="grain" patternUnits="userSpaceOnUse" width="100" height="100">
    <circle cx="20" cy="20" r="1" fill="#2a2a2a" opacity="0.3"/>
    <circle cx="80" cy="40" r="1" fill="#2a2a2a" opacity="0.3"/>
    <circle cx="40" cy="70" r="1" fill="#2a2a2a" opacity="0.3"/>
    <circle cx="90" cy="90" r="1" fill="#2a2a2a" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grain)"/>
  
  <!-- Main Content -->
  <text x="100" y="200" font-family="monospace" font-size="48" font-weight="bold" fill="#ffffff">
    Mohd Suhail
  </text>
  
  <text x="100" y="260" font-family="sans-serif" font-size="32" fill="#a3a3a3">
    Frontend Developer
  </text>
  
  <text x="100" y="320" font-family="sans-serif" font-size="24" fill="#a3a3a3">
    React • JavaScript • TypeScript • Modern Web
  </text>
  
  <!-- Experience Badge -->
  <rect x="100" y="380" width="200" height="60" rx="30" fill="#ffffff" opacity="0.1"/>
  <text x="200" y="415" font-family="sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">
    3+ Years Experience
  </text>
  
  <!-- Tech Icons/Symbols -->
  <circle cx="900" cy="150" r="40" fill="#61dafb" opacity="0.8"/> <!-- React Blue -->
  <text x="900" y="160" font-family="monospace" font-size="24" fill="#000000" text-anchor="middle">⚛</text>
  
  <circle cx="1000" cy="200" r="35" fill="#f7df1e" opacity="0.8"/> <!-- JS Yellow -->
  <text x="1000" y="210" font-family="monospace" font-size="20" fill="#000000" text-anchor="middle">JS</text>
  
  <circle cx="950" cy="280" r="35" fill="#06b6d4" opacity="0.8"/> <!-- Tailwind -->
  <text x="950" y="290" font-family="monospace" font-size="16" fill="#000000" text-anchor="middle">CSS</text>
  
  <!-- Website URL -->
  <text x="100" y="550" font-family="monospace" font-size="20" fill="#ffffff" opacity="0.8">
    Suhail.in
  </text>
  
  <!-- Decorative Elements -->
  <line x1="100" y1="500" x2="300" y2="500" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
</svg>
